<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Test - Defence Information</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
text-align:center;
}

header{
background:#0d47a1;
color:white;
padding:15px;
}

.container{
max-width:600px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#timer{
font-size:24px;
color:red;
font-weight:bold;
margin-bottom:20px;
}

.question{
font-size:20px;
margin-bottom:20px;
}

.option{
display:block;
margin:10px;
padding:10px;
background:#eee;
border-radius:5px;
cursor:pointer;
}

button{
margin-top:20px;
padding:10px 20px;
background:#0d47a1;
color:white;
border:none;
border-radius:5px;
font-size:18px;
}
</style>

</head>

<body>

<header>
<h1>Defence Information</h1>
<h3>Odisha Mock Test</h3>
</header>

<div class="container">

<div id="timer">60:00</div>

<div class="question">
1. Odisha Capital?
</div>

<label class="option"><input type="radio" name="q1"> Cuttack</label>
<label class="option"><input type="radio" name="q1"> Bhubaneswar</label>
<label class="option"><input type="radio" name="q1"> Sambalpur</label>
<label class="option"><input type="radio" name="q1"> Puri</label>

<button>Next</button>

</div>

</body>
</html>
