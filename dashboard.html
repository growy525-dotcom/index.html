<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Defence Information</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#0d47a1;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.btn{
display:inline-block;
padding:12px 20px;
background:#0d47a1;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>

</head>

<body>

<header>
<h1>Student Dashboard</h1>
</header>

<div class="container">

<div class="card">
<h2>Welcome Student 👋</h2>
<p>Select an option below.</p>
</div>

<div class="card">
<h3>Mock Tests</h3>
<a class="btn" href="#">Start Mock Test</a>
</div>

<div class="card">
<h3>PDF Notes</h3>
<a class="btn" href="#">Open PDFs</a>
</div>

<div class="card">
<h3>Latest Jobs</h3>
<a class="btn" href="#">View Jobs</a>
</div>

</div>

</body>
</html>
