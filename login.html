<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Defence Information</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
width:300px;
text-align:center;
}
input{
width:100%;
padding:10px;
margin:10px 0;
}
button{
width:100%;
padding:10px;
background:#0d47a1;
color:white;
border:none;
border-radius:5px;
}
</style>

</head>

<body>

<div class="box">
<h2>Student Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<p>New Student? Register Soon</p>

</div>

</body>
</html>
